trigger:
- main

pool:
  vmImage: 'windows-latest'

steps:
# 1. Habilitar o suporte a Aplicativos 32 Bits no IIS (DefaultAppPool)
- powershell: |
    echo "Importando módulo WebAdministration..."
    Import-Module WebAdministration
    
    echo "Configurando DefaultAppPool para aceitar aplicativos de 32 bits..."
    Set-ItemProperty "IIS:\AppPools\DefaultAppPool" -Name "enable32BitAppOnWin64" -Value "True"
    
    echo "Verificando alteração no IIS..."
    Get-ItemProperty "IIS:\AppPools\DefaultAppPool" -Name "enable32BitAppOnWin64"
  displayName: 'Habilitar Aplicativos 32 Bits no IIS'

# 2. Instalar o MySQL ODBC e Injetar chaves de compatibilidade (64 e 32 bits)
- powershell: |
    echo "Instalando MySQL ODBC via Chocolatey..."
    choco install mysql.odbc -y --no-progress
    
    echo "Identificando o nome do driver instalado..."
    $installedDriver = (Get-ItemProperty "HKLM:\SOFTWARE\ODBC\ODBCINST.INI\ODBC Drivers").psobject.properties.name | Where-Object { $_ -like "MySQL ODBC * Unicode Driver" } | Select-Object -First 1
    
    if ($installedDriver) {
        echo "Driver detectado: $installedDriver"
        
        # Lista de caminhos do Registro para injetar o alias (64-bit e 32-bit/Wow6432Node)
        $registryPaths = @(
            "HKLM:\SOFTWARE\ODBC\ODBCINST.INI",
            "HKLM:\SOFTWARE\Wow6432Node\ODBC\ODBCINST.INI"
        )
        
        foreach ($basePath in $registryPaths) {
            $sourcePath = "$basePath\$installedDriver"
            $targetPath = "$basePath\MySQL ODBC 5.3 Unicode Driver"
            
            if (Test-Path $sourcePath) {
                if (-not (Test-Path $targetPath)) {
                    New-Item -Path $targetPath -Force | Out-Null
                }
                Copy-ItemProperty -Path $sourcePath -Destination $targetPath -Name "Driver" -Force
                Copy-ItemProperty -Path $sourcePath -Destination $targetPath -Name "Setup" -Force
                Set-ItemProperty -Path "$basePath\ODBC Drivers" -Name "MySQL ODBC 5.3 Unicode Driver" -Value "Installed" -Force
                echo "Alias configurado com sucesso em: $basePath"
            }
        }
    } else {
        Write-Error "Falha ao localizar o driver instalado."
        exit 1
    }
  displayName: 'Instalar MySQL ODBC e Configurar Registro (32/64 bits)'

# 3. Iniciar o serviço do MySQL nativo do Windows do Azure
- powershell: |
    echo "Iniciando o serviço do MySQL..."
    Start-Service -Name "MySQL*"
    $env:Path += ";C:\Program Files\MySQL\MySQL Server 8.0\bin"
    mysql -u root -e "SELECT VERSION();"
  displayName: 'Iniciar e Verificar MySQL Server'

# 4. Criar o Banco de Dados e as Tabelas (DATABASE=simplesweb)
- powershell: |
    $env:Path += ";C:\Program Files\MySQL\MySQL Server 8.0\bin"
    
    # Cria o banco de dados
    mysql -u root -e "CREATE DATABASE IF NOT EXISTS simplesweb;"
    
    # Cria a tabela pessoa
    mysql -u root -D simplesweb -e "
    CREATE TABLE IF NOT EXISTS pessoa (
      Id int NOT NULL AUTO_INCREMENT,
      RazaoSocial varchar(80) DEFAULT NULL,
      NomeFantasia varchar(80) DEFAULT NULL,
      Cnpj varchar(18) DEFAULT NULL,
      InscrEstadual varchar(20) DEFAULT NULL,
      InscrMunicipal varchar(20) DEFAULT NULL,
      DataCadastro varchar(20) DEFAULT NULL,
      Email varchar(80) DEFAULT NULL,
      Celular varchar(15) DEFAULT NULL,
      Usuario varchar(20) DEFAULT NULL,
      Senha varchar(12) DEFAULT NULL,
      IeDestinatario varchar(20) DEFAULT NULL,
      PRIMARY KEY (Id)
    );
    "
    Write-Host "Banco de dados preparado para conexões sem criptografia SSL!"
  displayName: 'Configurar Schema do Banco de Dados'

# 5. Executar os Testes automatizados (Se houver testes locais)
- powershell: |
    echo "Executando validação de rotas/testes da aplicação..."
    # Exemplo: npm install && npm test
  displayName: 'Executar Testes de Unidade / Integração'

# 6. Compactar arquivos ASP (Seu código original)
- task: ArchiveFiles@2
  displayName: 'Compactar arquivos ASP'
  inputs:
    rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/AppASPVersao$(Build.BuildId).zip'
    replaceExistingArchive: true

# 7. Publicar Artefato no Azure (Seu código original)
- task: PublishBuildArtifacts@1
  displayName: 'Publicar Artefato no Azure'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/AppASPVersao$(Build.BuildId).zip'
    ArtifactName: 'drop'
    publishLocation: 'Container'
