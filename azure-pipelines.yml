trigger:
  branches:
    include:
      - main
  # Resolve o problema de autocommit: ignora a execução se apenas estes arquivos mudarem
  paths:
    exclude:
      - 'caminho/do/seu/arquivo_gerado_automaticamente.txt'
      - 'pasta_do_autocommit/*'

pool:
  vmImage: 'windows-latest'

steps:
# 1. Habilitar o suporte a Aplicativos 32 Bits no IIS (DefaultAppPool)
- powershell: |
    echo "Importando módulo WebAdministration..."
    Import-Module WebAdministration
    echo "Configurando DefaultAppPool para aceitar aplicativos de 32 bits..."
    Set-ItemProperty "IIS:\AppPools\DefaultAppPool" -Name "enable32BitAppOnWin64" -Value "True"
  displayName: 'Habilitar Aplicativos 32 Bits no IIS'

# 2. Baixar e instalar nativamente o driver MySQL ODBC 5.3.13 de 32 bits
- powershell: |
    echo "Baixando o driver MySQL ODBC 5.3.13 32-bits oficial..."
    $url = "https://huaweicloud.com"
    Invoke-WebRequest -Uri $url -OutFile "mysql-odbc-32.msi"
    
    echo "Instalando o driver silenciosamente no subsistema de 32 bits do Windows..."
    Start-Process msiexec.exe -ArgumentList '/i mysql-odbc-32.msi /quiet /norestart' -Wait
    echo "Driver nativo de 32 bits instalado com sucesso!"
  displayName: 'Instalar MySQL ODBC 5.3.13 (32-bit)'

# 3. Inicializar e Iniciar o MySQL via Binário com Senha Definida
- powershell: |
    $mysqlPath = "C:\Program Files\MySQL\MySQL Server 8.0\bin"
    
    # Criar um diretório de dados limpo para evitar conflitos de permissão
    $dataDir = "$(Agent.TempDirectory)\mysql-data"
    if (-not (Test-Path $dataDir)) {
        New-Item -ItemType Directory -Force -Path $dataDir
    }
    
    # Criar arquivo temporário para definir a senha do root na inicialização
    $initFile = "$(Agent.TempDirectory)\mysql-init.txt"
    "ALTER USER 'root'@'localhost' IDENTIFIED BY 'root';" | Out-File -FilePath $initFile -Encoding ascii
    
    echo "Inicializando o diretório de dados do MySQL..."
    & "$mysqlPath\mysqld.exe" --initialize-insecure --datadir=$dataDir
    
    echo "Iniciando o MySQL Server carregando as permissões e a senha..."
    Start-Process -FilePath "$mysqlPath\mysqld.exe" -ArgumentList "--datadir=$dataDir --init-file=$initFile --skip-ssl" -WindowStyle Hidden
    
    echo "Aguardando 15 segundos para o banco de dados iniciar na porta 3306..."
    Start-Sleep -Seconds 15
    
    echo "Testando conectividade local solicitando a chave pública do servidor..."
    & "$mysqlPath\mysql.exe" -u root -p"root" -h 127.0.0.1 --get-server-public-key -e "SELECT VERSION();"
    
    if ($LASTEXITCODE -ne 0) {
        Write-Error "Falha ao conectar no MySQL Server local."
        exit 1
    }
  displayName: 'Iniciar e Verificar MySQL Server'
  
# 4. Criar o Banco de Dados e as Tabelas (DATABASE=simplesweb)
- powershell: |
    $mysqlPath = "C:\Program Files\MySQL\MySQL Server 8.0\bin"
    
    echo "Criando banco de dados se não existir..."
    & "$mysqlPath\mysql.exe" -u root -p"root" -h 127.0.0.1 --get-server-public-key -e "CREATE DATABASE IF NOT EXISTS simplesweb;"
    
    echo "Criando a tabela pessoa..."
    & "$mysqlPath\mysql.exe" -u root -p"root" -h 127.0.0.1 --get-server-public-key -D simplesweb -e "
    CREATE TABLE IF NOT EXISTS pessoa (
      Id int NOT NULL AUTO_INCREMENT,
      RazaoSocial varchar(80) DEFAULT NULL,
      NomeFantasia varchar(80) DEFAULT NULL,
      Cnpj varchar(18) DEFAULT NULL,
      InscrEstadual varchar(20) DEFAULT NULL,
      InscrMunicipal varchar(20) DEFAULT NULL,
      DataCadastro varchar(20) DEFAULT NULL,
      Email varchar(80) DEFAULT NULL,
      Celular varchar(15) DEFAULT NULL,
      Usuario varchar(20) DEFAULT NULL,
      Senha varchar(12) DEFAULT NULL,
      IeDestinatario varchar(20) DEFAULT NULL,
      PRIMARY KEY (Id)
    );
    "
    Write-Host "Banco de dados simplesweb estruturado com sucesso!"
  displayName: 'Configurar Schema do Banco de Dados'
  
# 5. Executar os Testes automatizados (Se houver testes locais)
- powershell: |
    echo "Executando testes da aplicação..."
  displayName: 'Executar Testes de Unidade / Integração'

# 6. Compactar arquivos ASP (Seu código original)
- task: ArchiveFiles@2
  displayName: 'Compactar arquivos ASP'
  inputs:
    rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/AppASPVersao$(Build.BuildId).zip'
    replaceExistingArchive: true

# 7. Publicar Artefato no Azure (Seu código original)
- task: PublishBuildArtifacts@1
  displayName: 'Publicar Artefato no Azure'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/AppASPVersao$(Build.BuildId).zip'
    ArtifactName: 'drop'
    publishLocation: 'Container'
